<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý tài khoản - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        input:not(:placeholder-shown):invalid {
            border-color: #dc3545;
        }
        input:not(:placeholder-shown):invalid ~ .invalid-feedback {
            display: block !important;
            color: #dc3545;
            font-size: 0.875em;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro - Admin</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <a th:href="@{/admin/buses}" class="btn btn-outline-light btn-sm me-2">Quản lý xe</a>
            <a th:href="@{/admin/trips}" class="btn btn-outline-light btn-sm me-2">Chuyến xe</a>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Quản lý tài khoản</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        Không thể xóa tài khoản đang đăng nhập!
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- Form tạo tài khoản mới -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">➕ Tạo tài khoản mới</div>
        <div class="card-body">
            <form th:action="@{/admin/users/create}" method="post" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control"
                           th:classappend="${errorUsername} ? 'is-invalid' : ''"
                           name="username" placeholder=" " minlength="4">
                    <div class="invalid-feedback" th:if="${errorUsername}" th:text="${errorUsername}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control"
                           th:classappend="${errorPassword} ? 'is-invalid' : ''"
                           name="password" placeholder=" " minlength="8">
                    <div class="invalid-feedback" th:if="${errorPassword}" th:text="${errorPassword}"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Vai trò</label>
                    <select class="form-select" name="role">
                        <option value="PASSENGER">Hành khách</option>
                        <option value="STAFF">Nhân viên</option>
                        <option value="ADMIN">Quản trị viên</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Tạo tài khoản</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Danh sách tài khoản -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Tên đăng nhập</th>
            <th>Vai trò</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user, i : ${users}">
            <td th:text="${i.count}"></td>
            <td th:text="${user.username}"></td>
            <td>
                <span th:if="${user.role.name() == 'ADMIN'}" class="badge bg-danger">Admin</span>
                <span th:if="${user.role.name() == 'STAFF'}" class="badge bg-warning text-dark">Nhân viên</span>
                <span th:if="${user.role.name() == 'PASSENGER'}" class="badge bg-success">Hành khách</span>
            </td>
            <td>
                <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Xác nhận xóa tài khoản này?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
