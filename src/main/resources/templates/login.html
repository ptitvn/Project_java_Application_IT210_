<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - Bus Ticket Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9 col-xl-8">
                <div class="card auth-card">
                    <div class="row g-0">
                        <div class="col-md-5 auth-hero d-flex flex-column justify-content-between">
                            <div>
                                <div class="fs-2 mb-3">🚌</div>
                                <h2 class="fw-black mb-3">Bus Ticket Pro</h2>
                                <p class="mb-0 opacity-75">Đặt vé xe khách liên tỉnh nhanh chóng, an toàn và tiện lợi.</p>
                            </div>
                            <div class="mt-5 small opacity-75">Java Web Application</div>
                        </div>
                        <div class="col-md-7 auth-form">
                            <h3 class="fw-bold mb-1">Đăng nhập</h3>
                            <p class="text-muted mb-4">Chào mừng bạn quay trở lại.</p>

                            <div th:if="${param.logout}" class="alert alert-info">Bạn đã đăng xuất thành công!</div>
                            <div th:if="${param.registered}" class="alert alert-success">Đăng ký thành công! Vui lòng đăng nhập.</div>
                            <div th:if="${param.error}" class="alert alert-danger">Tên đăng nhập hoặc mật khẩu không đúng.</div>

                            <form th:action="@{/login}" method="post" novalidate>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Tên đăng nhập</label>
                                    <input type="text" class="form-control" name="username" minlength="4" required placeholder="Nhập tên đăng nhập">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Mật khẩu</label>
                                    <input type="password" class="form-control" name="password" minlength="8" required placeholder="Nhập mật khẩu">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2">Đăng nhập</button>
                                <p class="mt-4 text-center mb-0">
                                    Chưa có tài khoản? <a th:href="@{/register}" class="fw-semibold">Đăng ký ngay</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
