<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt vé - Ghế [[${seat.seatNumber}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h2 class="mb-4">Đặt vé - Ghế: [[${seat.seatNumber}]]</h2>

<div th:if="${errorMsg}" class="alert alert-danger">[[${errorMsg}]]</div>

<form th:action="@{/book-ticket}" th:object="${bookingRequest}" method="post" class="row g-3">
    <input type="hidden" th:field="*{tripId}" />
    <input type="hidden" th:field="*{seatId}" />

    <div class="col-md-6">
        <label class="form-label">Họ tên</label>
        <input type="text" class="form-control" th:field="*{passengerName}" placeholder="Nguyen Van A" required>
    </div>
    <div class="col-md-6">
        <label class="form-label">Số điện thoại</label>
        <input type="text" class="form-control" th:field="*{phone}" placeholder="0987654321" required>
    </div>
    <div class="col-md-12">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" th:field="*{email}" placeholder="example@gmail.com">
    </div>

    <div class="col-12">
        <button type="submit" class="btn btn-primary">Đặt vé</button>
        <a th:href="@{/passenger/trips/{id}/seats(id=${trip.id})}" class="btn btn-secondary">Quay lại sơ đồ ghế</a>    </div>
</form>

</body>
</html>
