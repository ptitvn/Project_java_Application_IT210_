<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt vé - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark btp-navbar-passenger">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🚌 Bus Ticket Pro</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/passenger/trips}" class="btn btn-outline-light btn-sm">Tìm chuyến</a>
            <a th:href="@{/passenger/my-tickets}" class="btn btn-outline-light btn-sm">Vé của tôi</a>
            <a th:href="@{/}" class="btn btn-light btn-sm">Trang chủ</a>
        </div>
    </div>
</nav>

<main class="container page-shell">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
                <div>
                    <h2 class="page-title">Đặt vé xe</h2>
                    <p class="page-subtitle">Hoàn tất thông tin để giữ chỗ cho chuyến đi của bạn.</p>
                </div>
                <a th:href="@{/passenger/trips/{id}/seats(id=${trip.id})}" class="btn btn-outline-secondary">← Quay lại sơ đồ ghế</a>
            </div>

            <div class="row g-4">

                <!-- Thông tin chuyến + ghế -->
                <div class="col-md-4">
                    <div class="btp-card text-center h-100">
                        <div class="btp-card-body">

                            <div class="mb-3">
                                <div style="width:100px;height:100px;border-radius:24px;background:linear-gradient(135deg,#2563eb,#1e3a8a);display:flex;align-items:center;justify-content:center;margin:auto;color:white;font-size:40px;font-weight:700;box-shadow:0 10px 30px rgba(37,99,235,.25);">
                                    🪑
                                </div>
                            </div>

                            <!-- Hiển thị danh sách ghế đã chọn -->
                            <h3 class="fw-bold mb-1">
                                <span th:if="${seats.size() == 1}">Ghế <span th:text="${seats[0].seatNumber}"></span></span>
                                <span th:if="${seats.size() > 1}"><span th:text="${seats.size()}"></span> ghế đã chọn</span>
                            </h3>
                            <div th:if="${seats.size() > 1}" class="mb-2">
                                <span th:each="s, i : ${seats}">
                                    <span class="badge bg-primary" th:text="'Ghế ' + ${s.seatNumber}"></span>
                                </span>
                            </div>

                            <p class="text-muted mb-4">Vé đang được giữ cho bạn</p>

                            <div class="text-start small">
                                <div class="mb-3">
                                    <div class="text-muted">Tuyến xe</div>
                                    <div class="fw-semibold" th:text="${trip.route.fromLocation.name + ' → ' + trip.route.toLocation.name}"></div>
                                </div>
                                <div class="mb-3">
                                    <div class="text-muted">Giờ khởi hành</div>
                                    <div class="fw-semibold" th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}"></div>
                                </div>
                                <div class="mb-3">
                                    <div class="text-muted">Xe</div>
                                    <div class="fw-semibold" th:text="${trip.bus.licensePlate + ' - ' + trip.bus.type}"></div>
                                </div>
                                <div class="mb-3">
                                    <div class="text-muted">Giá / ghế</div>
                                    <div class="fw-bold text-success" th:text="${#numbers.formatDecimal(trip.price,0,'COMMA',0,'POINT') + ' đ'}"></div>
                                </div>
                                <div>
                                    <div class="text-muted">Tổng tiền</div>
                                    <div class="fw-bold text-success fs-5" th:text="${#numbers.formatDecimal(trip.price * seats.size(),0,'COMMA',0,'POINT') + ' đ'}"></div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- Form thông tin hành khách -->
                <div class="col-md-8">
                    <div class="btp-card">
                        <div class="btp-card-header">📝 Thông tin hành khách</div>
                        <div class="btp-card-body">

                            <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                            <form th:action="@{/book-ticket}" th:object="${bookingRequest}" method="post" class="row g-4">
                                <!-- Hidden fields -->
                                <input type="hidden" name="tripId" th:value="${trip.id}">
                                <th:block th:each="s : ${seats}">
                                    <input type="hidden" name="seatIds" th:value="${s.id}">
                                </th:block>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Họ tên</label>
                                    <input type="text" class="form-control"
                                           th:field="*{passengerName}"
                                           th:classappend="${#fields.hasErrors('passengerName')} ? 'is-invalid' : ''"
                                           placeholder="Nguyễn Văn A">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('passengerName')}" th:errors="*{passengerName}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <input type="text" class="form-control"
                                           th:field="*{phone}"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                           placeholder="0987654321">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="text" class="form-control"
                                           th:field="*{email}"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                           placeholder="email@example.com">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>

                                <div class="col-12">
                                    <div class="d-flex flex-wrap justify-content-end gap-2">
                                        <a th:href="@{/passenger/trips/{id}/seats(id=${trip.id})}" class="btn btn-outline-secondary">Hủy</a>
                                        <button type="submit" class="btn btn-primary">🎫 Xác nhận đặt vé</button>
                                    </div>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

</body>
</html>
