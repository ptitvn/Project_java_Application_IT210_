<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tìm chuyến xe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h3>Danh sách chuyến xe</h3>
    <table class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>#</th>
            <th>Tuyến đường</th>
            <th>Khởi hành</th>
            <th>Xe</th>
            <th>Giá vé</th>
            <th>Ghế trống</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="trip, i : ${trips}">
            <td th:text="${i.count}"></td>
            <td th:text="${trip.route.fromLocation.name + ' → ' + trip.route.toLocation.name}"></td>
            <td th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${trip.bus.licensePlate + ' (' + trip.bus.type + ')'}"></td>
            <td th:text="${#numbers.formatDecimal(trip.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
            <td th:text="${trip.bus.seatCount}"></td>
            <td>
                <a th:href="@{/passenger/trips/{id}/seats(id=${trip.id})}" class="btn btn-primary btn-sm">
                    Chọn ghế
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
