<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách chuyến xe - Bus Ticket Pro</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark btp-navbar-passenger">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🚌 Bus Ticket Pro</a>

        <div class="ms-auto d-flex align-items-center gap-2">
            <span class="text-white d-none d-md-inline">
                Xin chào, <strong th:text="${username}"></strong>
            </span>

            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm">Hồ sơ</a>

            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container page-shell">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
        <div>
            <h2 class="page-title">Danh sách chuyến xe</h2>
            <p class="page-subtitle">Chọn chuyến phù hợp để xem sơ đồ ghế.</p>
        </div>

        <a th:href="@{/passenger/my-tickets}" class="btn btn-outline-primary">
            🎫 Vé của tôi
        </a>
    </div>

    <div class="row g-3" th:if="${!#lists.isEmpty(trips)}">
        <div class="col-lg-6" th:each="trip : ${trips}">
            <div class="trip-card h-100">
                <div class="d-flex justify-content-between gap-3 mb-3">
                    <div>
                        <div class="route-text"
                             th:text="${trip.route.fromLocation.name + ' → ' + trip.route.toLocation.name}">
                        </div>

                        <div class="text-muted mt-1"
                             th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}">
                        </div>
                    </div>

                    <div class="text-end">
                        <div class="price-text"
                             th:text="${#numbers.formatDecimal(trip.price, 0, 'COMMA', 0, 'POINT') + ' đ'}">
                        </div>

                        <span class="badge bg-success">Còn ghế</span>
                    </div>
                </div>

                <div class="row g-2 text-muted small mb-4">
                    <div class="col-6">
                        🚌 <span th:text="${trip.bus.licensePlate}"></span>
                    </div>

                    <div class="col-6">
                        💺 <span th:text="${trip.bus.type + ' - ' + trip.bus.seatCount + ' ghế'}"></span>
                    </div>
                </div>

                <a th:href="@{/passenger/trips/{id}/seats(id=${trip.id})}"
                   class="btn btn-primary w-100">
                    Chọn ghế
                </a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(trips)}" class="btp-card empty-state">
        <div class="fs-1 mb-2">🚌</div>
        <h5 class="fw-bold">Chưa có chuyến xe nào</h5>
        <p class="mb-0">Vui lòng quay lại sau.</p>
    </div>
</main>
</body>
</html>
