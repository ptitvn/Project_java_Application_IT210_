<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng ký - Bus Ticket Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9 col-xl-8">
                <div class="card auth-card">
                    <div class="row g-0">
                        <div class="col-md-5 auth-hero d-flex flex-column justify-content-between">
                            <div>
                                <div class="fs-2 mb-3">🎫</div>
                                <h2 class="fw-bold mb-3">Tạo tài khoản</h2>
                                <p class="mb-0 opacity-75">Tra cứu chuyến, chọn ghế và quản lý vé của bạn dễ dàng hơn.</p>
                            </div>
                            <div class="mt-5 small opacity-75">Passenger Account</div>
                        </div>
                        <div class="col-md-7 auth-form">
                            <h3 class="fw-bold mb-1">Đăng ký</h3>
                            <p class="text-muted mb-4">Tài khoản mặc định là hành khách.</p>

                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                            <form th:action="@{/register}" th:object="${userDTO}" method="post" novalidate>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Tên đăng nhập</label>
                                    <input type="text" class="form-control" th:field="*{username}" minlength="4"
                                           placeholder="Tối thiểu 4 ký tự"
                                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Mật khẩu</label>
                                    <input type="password" class="form-control" th:field="*{password}" minlength="8"
                                           placeholder="Tối thiểu 8 ký tự"
                                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Xác nhận mật khẩu</label>
                                    <input type="password" class="form-control" name="confirmPassword" minlength="8" placeholder="Nhập lại mật khẩu">
                                </div>

                                <input type="hidden" name="role" value="PASSENGER">
                                <button type="submit" class="btn btn-primary w-100 py-2">Tạo tài khoản</button>
                                <p class="mt-4 text-center mb-0">
                                    Đã có tài khoản? <a th:href="@{/login}" class="fw-semibold">Đăng nhập</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
