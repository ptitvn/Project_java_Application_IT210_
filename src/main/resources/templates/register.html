<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký - Bus Ticket Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        input:not(:placeholder-shown):invalid {
            border-color: #dc3545;
        }
        input:not(:placeholder-shown):invalid ~ .invalid-feedback {
            display: block !important;
            color: #dc3545;
            font-size: 0.875em;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h3 class="text-center mb-4">Đăng ký tài khoản</h3>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/register}" th:object="${userDTO}" method="post">

                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control"
                           th:field="*{username}"
                           placeholder=" " minlength="4"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('username')}"
                         th:errors="*{username}"></div>
                    <div class="invalid-feedback"
                         th:unless="${#fields.hasErrors('username')}">
                        Tên đăng nhập phải từ 4 ký tự trở lên
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control"
                           th:field="*{password}"
                           placeholder=" " minlength="8"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                    <div class="invalid-feedback"
                         th:unless="${#fields.hasErrors('password')}">
                        Mật khẩu phải ít nhất 8 ký tự
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" class="form-control"
                           name="confirmPassword"
                           placeholder=" " minlength="8">
                    <div class="invalid-feedback">
                        Vui lòng nhập lại mật khẩu (ít nhất 8 ký tự)
                    </div>
                </div>

                <input type="hidden" name="role" value="PASSENGER"/>

                <button type="submit" class="btn btn-success w-100">Đăng ký</button>
                <p class="mt-3 text-center">
                    <a th:href="@{/login}">Đã có tài khoản? Đăng nhập</a>
                </p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
