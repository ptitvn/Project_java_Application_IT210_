<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Chuyến xe - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .flash-message {
            animation: fadeOut 5s forwards;
        }
        @keyframes fadeOut {
            0%   { opacity: 1; }
            80%  { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro - Admin</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <a th:href="@{/admin/buses}" class="btn btn-outline-light btn-sm me-2">Quản lý xe</a>
            <a th:href="@{/admin/buses/locations}" class="btn btn-outline-light btn-sm me-2">Tỉnh thành</a>
            <a th:href="@{/admin/buses/routes}" class="btn btn-outline-light btn-sm me-2">Tuyến đường</a>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Flash messages -->
    <div th:if="${successMsg != null and !#strings.isEmpty(successMsg)}"
         class="alert alert-success flash-message"
         th:text="${successMsg}"></div>

    <div th:if="${errorMsg != null and !#strings.isEmpty(errorMsg)}"
         class="alert alert-danger flash-message"
         th:text="${errorMsg}"></div>

    <h2>Danh sách Chuyến xe</h2>
    <a th:href="@{/admin/trips/new}" class="btn btn-primary mb-3">+ Thêm chuyến mới</a>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Xe (Biển số - Loại)</th>
            <th>Tuyến đường</th>
            <th>Giờ khởi hành</th>
            <th>Giá vé</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="trip, i : ${trips}">
            <td th:text="${i.count}"></td>
            <td th:text="${trip.bus.licensePlate + ' - ' + trip.bus.type}"></td>
            <td th:text="${trip.route.fromLocation.name + ' → ' + trip.route.toLocation.name}"></td>
            <td th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${#numbers.formatDecimal(trip.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>

            <!-- Cột trạng thái -->
            <td>
                <span th:if="${departedMap[trip.id]}"
                      class="badge bg-secondary">Đã khởi hành</span>
                <span th:if="${!departedMap[trip.id]}"
                      class="badge bg-success">Sắp khởi hành</span>
            </td>

            <!-- Cột hành động -->
            <td>
                <!-- Chuyến đã khởi hành: cho xóa tự do -->
                <span th:if="${departedMap[trip.id]}">
                    <a th:href="@{/admin/trips/delete/{id}(id=${trip.id})}"
                       class="btn btn-outline-danger btn-sm"
                       onclick="return confirm('Chuyến đã khởi hành. Xác nhận xóa toàn bộ dữ liệu chuyến này?')">
                         Xóa
                    </a>
                </span>

                <!-- Chuyến chưa khởi hành: cảnh báo, nhưng vẫn cho xóa nếu không có vé PAID -->
                <span th:if="${!departedMap[trip.id]}">
                    <a th:href="@{/admin/trips/delete/{id}(id=${trip.id})}"
                       class="btn btn-outline-danger btn-sm"
                       onclick="return confirm('Chuyến chưa khởi hành! Nếu có vé đã thanh toán sẽ không thể xóa. Tiếp tục?')">
                         Xóa
                    </a>
                </span>
            </td>
        </tr>

        <!-- Không có chuyến nào -->
        <tr th:if="${#lists.isEmpty(trips)}">
            <td colspan="7" class="text-center text-muted">Chưa có chuyến xe nào.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
