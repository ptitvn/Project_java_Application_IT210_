<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sơ đồ ghế</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f5f7fb; }

        .seat-btn, .seat-link {
            width: 58px; height: 58px;
            font-size: 12px; font-weight: 700;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .seat-available { background-color: #198754; color: white; border: none; }
        .seat-available:hover { background-color: #157347; color: white; }
        .seat-pending { background-color: #ffc107; color: black; border: none; cursor: not-allowed; }
        .seat-booked { background-color: #dc3545; color: white; border: none; cursor: not-allowed; }

        .bus-layout {
            background: white;
            border: 3px solid #dbe4f0;
            border-radius: 26px;
            padding: 24px 20px 28px;
            display: inline-block;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .seat-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .aisle { width: 40px; }

        .driver-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eef3fb;
            border: 1px solid #dce6f5;
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h3 class="mb-3">Sơ đồ ghế</h3>

    <!-- Thông tin chuyến -->
    <div class="card shadow-sm border-0 p-3 mb-4">
        <div class="row">
            <div class="col-md-6">
                <p class="mb-2"><strong>Tuyến:</strong>
                    <span th:text="${trip.route.fromLocation.name + ' → ' + trip.route.toLocation.name}"></span>
                </p>
                <p class="mb-2"><strong>Khởi hành:</strong>
                    <span th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}"></span>
                </p>
            </div>
            <div class="col-md-6">
                <p class="mb-2"><strong>Xe:</strong>
                    <span th:text="${trip.bus.licensePlate + ' - ' + trip.bus.type}"></span>
                </p>
                <p class="mb-0"><strong>Giá vé:</strong>
                    <span th:text="${#numbers.formatDecimal(trip.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                </p>
            </div>
        </div>
    </div>

    <!-- Chú thích -->
    <div class="d-flex gap-4 mb-4">
        <div class="d-flex align-items-center gap-2">
            <div class="seat-link seat-available" style="width:34px;height:34px;font-size:11px;">01</div>
            <span>Còn trống</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="seat-btn seat-pending" style="width:34px;height:34px;font-size:11px;">01</div>
            <span>Đang giữ</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="seat-btn seat-booked" style="width:34px;height:34px;font-size:11px;">01</div>
            <span>Đã đặt</span>
        </div>
    </div>

    <!-- Sơ đồ xe -->
    <div class="bus-layout">
        <!-- Đầu xe -->
        <div class="driver-box">
            <span style="font-weight:600;color:#0d6efd;">ĐẦU XE</span>
            <span style="font-weight:600;">👨‍✈️ Tài xế</span>
        </div>

        <!-- Ghế theo hàng, mỗi hàng 4 ghế (2 trái - lối đi - 2 phải) -->
        <th:block th:each="rowIndex : ${#numbers.sequence(0, (seats.size() - 1) / 4)}">
            <div class="seat-row">
                <!-- Ghế trái 1 -->
                <th:block th:if="${rowIndex * 4 < seats.size()}">
                    <th:block th:with="seat=${seats[rowIndex * 4]}">
                        <a th:if="${seat.status.name() == 'AVAILABLE'}"
                           th:href="@{/booking-form(tripId=${trip.id}, seatId=${seat.id})}"
                           class="seat-link seat-available"
                           th:text="${seat.seatNumber}"></a>
                        <button th:if="${seat.status.name() == 'PENDING'}"
                                class="seat-btn seat-pending"
                                th:text="${seat.seatNumber}" disabled></button>
                        <button th:if="${seat.status.name() == 'BOOKED'}"
                                class="seat-btn seat-booked"
                                th:text="${seat.seatNumber}" disabled></button>
                    </th:block>
                </th:block>

                <!-- Ghế trái 2 -->
                <th:block th:if="${rowIndex * 4 + 1 < seats.size()}">
                    <th:block th:with="seat=${seats[rowIndex * 4 + 1]}">
                        <a th:if="${seat.status.name() == 'AVAILABLE'}"
                           th:href="@{/booking-form(tripId=${trip.id}, seatId=${seat.id})}"
                           class="seat-link seat-available"
                           th:text="${seat.seatNumber}"></a>
                        <button th:if="${seat.status.name() == 'PENDING'}"
                                class="seat-btn seat-pending"
                                th:text="${seat.seatNumber}" disabled></button>
                        <button th:if="${seat.status.name() == 'BOOKED'}"
                                class="seat-btn seat-booked"
                                th:text="${seat.seatNumber}" disabled></button>
                    </th:block>
                </th:block>

                <!-- Lối đi -->
                <div class="aisle"></div>

                <!-- Ghế phải 1 -->
                <th:block th:if="${rowIndex * 4 + 2 < seats.size()}">
                    <th:block th:with="seat=${seats[rowIndex * 4 + 2]}">
                        <a th:if="${seat.status.name() == 'AVAILABLE'}"
                           th:href="@{/booking-form(tripId=${trip.id}, seatId=${seat.id})}"
                           class="seat-link seat-available"
                           th:text="${seat.seatNumber}"></a>
                        <button th:if="${seat.status.name() == 'PENDING'}"
                                class="seat-btn seat-pending"
                                th:text="${seat.seatNumber}" disabled></button>
                        <button th:if="${seat.status.name() == 'BOOKED'}"
                                class="seat-btn seat-booked"
                                th:text="${seat.seatNumber}" disabled></button>
                    </th:block>
                </th:block>

                <!-- Ghế phải 2 -->
                <th:block th:if="${rowIndex * 4 + 3 < seats.size()}">
                    <th:block th:with="seat=${seats[rowIndex * 4 + 3]}">
                        <a th:if="${seat.status.name() == 'AVAILABLE'}"
                           th:href="@{/booking-form(tripId=${trip.id}, seatId=${seat.id})}"
                           class="seat-link seat-available"
                           th:text="${seat.seatNumber}"></a>
                        <button th:if="${seat.status.name() == 'PENDING'}"
                                class="seat-btn seat-pending"
                                th:text="${seat.seatNumber}" disabled></button>
                        <button th:if="${seat.status.name() == 'BOOKED'}"
                                class="seat-btn seat-booked"
                                th:text="${seat.seatNumber}" disabled></button>
                    </th:block>
                </th:block>
            </div>
        </th:block>
    </div>

    <div class="mt-4">
        <a th:href="@{/passenger/trips}" class="btn btn-secondary">← Quay lại</a>
    </div>
</div>
</body>
</html>
