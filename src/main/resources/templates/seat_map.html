<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ đồ ghế - Bus Ticket Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .seat-selected {
            background-color: #2563eb !important;
            color: white !important;
            border: 2px solid #1d4ed8 !important;
        }
        .selected-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 2px solid #2563eb;
            padding: 12px 0; box-shadow: 0 -4px 16px rgba(0,0,0,0.12);
            z-index: 1000; display: none;
        }
    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark btp-navbar-passenger">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🚌 Bus Ticket Pro</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <span class="text-white d-none d-md-inline">
                Xin chào, <strong th:text="${username}"></strong>
            </span>
            <a th:href="@{/passenger/trips}" class="btn btn-outline-light btn-sm">Tìm chuyến</a>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container page-shell" style="padding-bottom:100px;">
    <!-- Thêm ngay sau thẻ <main> -->
    <div th:if="${errorMsg}" class="container mt-3">
        <div class="alert alert-danger alert-auto-dismiss">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>
    </div>
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
        <div>
            <h2 class="page-title">Sơ đồ ghế</h2>
            <p class="page-subtitle">Chọn một hoặc nhiều ghế còn trống để đặt vé.</p>
        </div>
        <a th:href="@{/passenger/trips}" class="btn btn-outline-secondary">← Quay lại</a>
    </div>

    <div class="btp-card btp-card-body mb-4">
        <div class="row g-3">
            <div class="col-md-6">
                <div class="text-muted small">Tuyến đường</div>
                <div class="fw-bold" th:text="${trip.route.fromLocation.name + ' → ' + trip.route.toLocation.name}"></div>
            </div>
            <div class="col-md-6">
                <div class="text-muted small">Khởi hành</div>
                <div class="fw-bold" th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}"></div>
            </div>
            <div class="col-md-6">
                <div class="text-muted small">Xe</div>
                <div class="fw-bold" th:text="${trip.bus.licensePlate + ' - ' + trip.bus.type}"></div>
            </div>
            <div class="col-md-6">
                <div class="text-muted small">Giá vé / ghế</div>
                <div class="fw-bold text-primary" th:text="${#numbers.formatDecimal(trip.price, 0, 'COMMA', 0, 'POINT') + ' đ'}"></div>
            </div>
        </div>
    </div>

    <!-- Chú thích -->
    <div class="d-flex flex-wrap gap-3 mb-4">
        <div class="d-flex align-items-center gap-2">
            <div class="seat-link seat-available" style="width:34px;height:34px;font-size:11px;">01</div>
            <span>Còn trống</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="seat-link seat-selected" style="width:34px;height:34px;font-size:11px;">01</div>
            <span>Đang chọn</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="seat-btn seat-pending" style="width:34px;height:34px;font-size:11px;">01</div>
            <span>Đang giữ</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="seat-btn seat-booked" style="width:34px;height:34px;font-size:11px;">01</div>
            <span>Đã đặt</span>
        </div>
    </div>

    <!-- Form bao ngoài toàn bộ sơ đồ ghế -->
    <form th:action="@{/booking-form}" method="get" id="seatForm">
        <input type="hidden" name="tripId" th:value="${trip.id}"/>

        <div class="text-center">
            <div class="bus-layout">
                <div class="driver-box">
                    <span class="fw-bold text-primary">ĐẦU XE</span>
                    <span class="fw-bold">👨‍✈️ Tài xế</span>
                </div>

                <th:block th:each="rowIndex : ${#numbers.sequence(0, (seats.size() - 1) / 4)}">
                    <div class="seat-row">
                        <th:block th:each="offset : ${#numbers.sequence(0, 3)}">
                            <div th:if="${offset == 2}" class="aisle"></div>

                            <th:block th:if="${rowIndex * 4 + offset < seats.size()}">
                                <th:block th:with="seat=${seats[rowIndex * 4 + offset]}">

                                    <!-- ✅ Ghế trống - dùng label + checkbox ẩn -->
                                    <th:block th:if="${seat.status.name() == 'AVAILABLE'}">
                                        <input type="checkbox"
                                               name="seatIds"
                                               th:value="${seat.id}"
                                               th:id="'seat_' + ${seat.id}"
                                               style="display:none;"
                                               onchange="updateBar()">
                                        <label th:for="'seat_' + ${seat.id}"
                                               class="seat-link seat-available"
                                               th:text="${seat.seatNumber}"
                                               th:data-price="${trip.price}"
                                               th:data-number="${seat.seatNumber}"
                                               onclick="toggleLabel(this)"></label>
                                    </th:block>

                                    <button th:if="${seat.status.name() == 'PENDING'}"
                                            class="seat-btn seat-pending"
                                            th:text="${seat.seatNumber}"
                                            disabled type="button"></button>

                                    <button th:if="${seat.status.name() == 'BOOKED'}"
                                            class="seat-btn seat-booked"
                                            th:text="${seat.seatNumber}"
                                            disabled type="button"></button>
                                </th:block>
                            </th:block>
                        </th:block>
                    </div>
                </th:block>
            </div>
        </div>

        <!-- Nút submit ẩn -->
        <button type="submit" id="submitBtn" style="display:none;">Đặt vé</button>
    </form>
</main>

<!-- Thanh chọn ghế -->
<div class="selected-bar" id="selectedBar">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <strong>Ghế đã chọn:</strong>
            <span id="selectedNames" class="ms-2 text-primary fw-bold"></span>
            <span class="ms-3 text-muted">Tổng tiền:</span>
            <span id="totalPrice" class="ms-1 fw-bold text-success"></span>
        </div>
        <button type="button" class="btn btn-primary" onclick="document.getElementById('submitBtn').click()">
            🎫 Đặt vé (<span id="seatCount">0</span> ghế)
        </button>
    </div>
</div>

<script>
    function toggleLabel(label) {
        const checkbox = document.getElementById(label.getAttribute('for'));
        if (checkbox.checked) {
            label.classList.remove('seat-selected');
            label.classList.add('seat-available');
        } else {
            label.classList.remove('seat-available');
            label.classList.add('seat-selected');
        }
    }

    function updateBar() {
        const checked = document.querySelectorAll('input[name="seatIds"]:checked');
        const bar = document.getElementById('selectedBar');

        if (checked.length === 0) {
            bar.style.display = 'none';
            return;
        }

        bar.style.display = 'block';
        document.getElementById('seatCount').textContent = checked.length;

        const names = Array.from(checked).map(cb => {
            const label = document.querySelector('label[for="' + cb.id + '"]');
            return 'Ghế ' + label.getAttribute('data-number');
        });
        document.getElementById('selectedNames').textContent = names.join(', ');

        const price = parseFloat(document.querySelector('label[data-price]').getAttribute('data-price'));
        document.getElementById('totalPrice').textContent =
            new Intl.NumberFormat('vi-VN').format(checked.length * price) + ' đ';
    }
</script>
</body>
</html>
