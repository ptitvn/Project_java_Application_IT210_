<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Xe - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro - Admin</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <a th:href="@{/admin/users}" class="btn btn-outline-light btn-sm me-2">Tài khoản</a>
            <a th:href="@{/admin/buses/locations}" class="btn btn-outline-light btn-sm me-2">Tỉnh thành</a>
            <a th:href="@{/admin/buses/routes}" class="btn btn-outline-light btn-sm me-2">Tuyến đường</a>
            <a th:href="@{/admin/trips}" class="btn btn-outline-light btn-sm me-2">Chuyến xe</a>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Danh sách Xe</h2>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Biển số</th>
            <th>Loại xe</th>
            <th>Số ghế</th>
            <th>Tài xế</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="bus : ${buses}">
            <td th:text="${bus.licensePlate}"></td>
            <td th:text="${bus.type}"></td>
            <td th:text="${bus.seatCount}"></td>
            <td th:text="${bus.driverName}"></td>
            <td>
                <a th:href="@{/admin/buses/edit/{id}(id=${bus.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{/admin/buses/delete/{id}(id=${bus.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc muốn xóa xe ' + this.closest('tr').querySelector('td').textContent + ' không?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/admin/buses/new}" class="btn btn-primary">+ Thêm Xe mới</a>
</div>
</body>
</html>
