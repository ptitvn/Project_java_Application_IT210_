<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý vé - Staff</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro - Nhân viên</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h4>Trang quản lý nhân viên</h4>
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-center p-4 shadow-sm">
                <h5>🎫 Vé chờ thanh toán</h5>
                <p class="text-muted">Xem và xác nhận các vé đang chờ thanh toán</p>
                <a th:href="@{/staff/pending-tickets}" class="btn btn-success">Xem danh sách</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
