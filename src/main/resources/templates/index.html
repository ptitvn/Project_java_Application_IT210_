<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trang chủ - Bus Ticket Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>

            <!-- Thay thế thẻ <a> đăng xuất bằng form này -->
            <form th:action="@{/logout}" method="post" style="display:inline">
                <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div th:if="${param.profileUpdated}" class="alert alert-success container mt-3">
        Cập nhật hồ sơ thành công!
    </div>
    <div class="container mt-5">
        <h4>Chào mừng bạn đến với Bus Ticket Pro!</h4>
        <p>Hệ thống đặt vé xe khách liên tỉnh.</p>
        <a th:href="@{/passenger/trips}" class="btn btn-primary btn-lg">🔍 Tìm chuyến xe</a>
        <a th:href="@{/passenger/my-tickets}" class="btn btn-outline-primary btn-sm me-2">🎫 Vé của tôi</a>
    </div>
</div>
</body>
</html>
