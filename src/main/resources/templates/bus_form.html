<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Xe - Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro - Admin</span>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Đăng xuất</a>
    </div>
</nav>
<div class="container mt-4">
    <h2 th:text="${busId != null} ? 'Sửa Xe' : 'Thêm Xe mới'"></h2>

    <form th:action="${busId != null} ? @{/admin/buses/update/{id}(id=${busId})} : @{/admin/buses/create}"
          th:object="${busDTO}" method="post" novalidate>

        <div class="mb-3">
            <label class="form-label">Biển số</label>
            <input type="text" class="form-control"
                   th:field="*{licensePlate}"
                   th:classappend="${#fields.hasErrors('licensePlate')} ? 'is-invalid' : ''">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('licensePlate')}"
                 th:errors="*{licensePlate}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Loại xe</label>
            <input type="text" class="form-control"
                   th:field="*{type}"
                   th:classappend="${#fields.hasErrors('type')} ? 'is-invalid' : ''">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('type')}"
                 th:errors="*{type}"></div>
        </div>

<!--        <div class="mb-3">-->
<!--            <label class="form-label">Số ghế (10 - 60)</label>-->
<!--            <input type="number" class="form-control"-->
<!--                   th:field="*{seatCount}"-->
<!--                   th:classappend="${#fields.hasErrors('seatCount')} ? 'is-invalid' : ''">-->
<!--            <div class="invalid-feedback"-->
<!--                 th:if="${#fields.hasErrors('seatCount')}"-->
<!--                 th:errors="*{seatCount}"></div>-->
<!--        </div>-->
        <div class="mb-3">
            <label class="form-label">Loại xe (số ghế)</label>
            <select class="form-select"
                    th:field="*{seatCount}"
                    th:classappend="${#fields.hasErrors('seatCount')} ? 'is-invalid' : ''">
                <option value="">-- Chọn loại xe --</option>
                <option value="16">Xe 16 chỗ</option>
                <option value="25">Xe 25 chỗ</option>
                <option value="29">Xe 29 chỗ</option>
                <option value="40">Xe 40 chỗ</option>
                <option value="45">Xe 45 chỗ</option>
                <option value="47">Xe 47 chỗ</option>
                <option value="60">Xe 60 chỗ</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('seatCount')}"
                 th:errors="*{seatCount}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Tài xế</label>
            <input type="text" class="form-control"
                   th:field="*{driverName}"
                   th:classappend="${#fields.hasErrors('driverName')} ? 'is-invalid' : ''">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('driverName')}"
                 th:errors="*{driverName}"></div>
        </div>

        <button type="submit" class="btn btn-success">Lưu</button>
        <a th:href="@{/admin/buses}" class="btn btn-secondary">Quay lại</a>
    </form>
</div>
</body>
</html>
