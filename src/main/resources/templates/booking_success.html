<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt vé thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h2 class="mb-4">Đặt vé thành công!</h2>

<div th:if="${successMsg}" class="alert alert-success">[[${successMsg}]]</div>

<div th:if="${ticket}" class="card p-3 mb-3">
    <p><strong>Mã vé:</strong> [[${ticket.ticketCode}]]</p>
    <p><strong>Chuyến:</strong> [[${ticket.trip.id}]]</p>
    <p><strong>Ghế:</strong> [[${ticket.seat.seatNumber}]]</p>
    <p><strong>Tổng tiền:</strong> [[${ticket.totalPrice}]]</p>
</div>

<a href="/" class="btn btn-primary">Về trang chủ</a>

</body>
</html>
