<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt vé thành công</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark btp-navbar-passenger">
    <div class="container">

        <a class="navbar-brand" th:href="@{/}">
            🚌 Bus Ticket Pro
        </a>

        <div class="ms-auto d-flex gap-2">

            <a th:href="@{/passenger/trips}" class="btn btn-outline-light btn-sm">
                Tìm chuyến
            </a>

            <a th:href="@{/passenger/my-tickets}" class="btn btn-outline-light btn-sm">
                Vé của tôi
            </a>

            <a th:href="@{/}" class="btn btn-light btn-sm">
                Trang chủ
            </a>

        </div>

    </div>
</nav>

<main class="container page-shell">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="btp-card text-center">

                <div class="btp-card-body p-5">

                    <div class="mb-4">
                        <div style="
                            width:100px;
                            height:100px;
                            border-radius:50%;
                            background:linear-gradient(135deg,#16a34a,#15803d);
                            display:flex;
                            align-items:center;
                            justify-content:center;
                            margin:auto;
                            color:white;
                            font-size:48px;
                            box-shadow:0 10px 30px rgba(22,163,74,.3);
                        ">
                            ✓
                        </div>
                    </div>

                    <h1 class="fw-bold mb-3 text-success">
                        Đặt vé thành công!
                    </h1>

                    <p class="text-muted fs-5 mb-4">
                        Vé của bạn đã được tạo thành công trong hệ thống.
                    </p>

                    <div th:if="${successMsg}"
                         class="alert alert-success"
                         th:text="${successMsg}">
                    </div>

                    <div th:if="${ticket}"
                         class="btp-card text-start mt-4">

                        <div class="btp-card-header">
                            🎫 Thông tin vé
                        </div>

                        <div class="btp-card-body">

                            <div class="row g-4">

                                <div class="col-md-6">
                                    <div class="text-muted small">
                                        Mã vé
                                    </div>

                                    <div class="fw-bold fs-5 text-primary"
                                         th:text="${ticket.ticketCode}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="text-muted small">
                                        Ghế ngồi
                                    </div>

                                    <div>
                                        <span class="badge bg-primary fs-6"
                                              th:text="${ticket.seat.seatNumber}">
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="text-muted small">
                                        Tuyến xe
                                    </div>

                                    <div class="fw-semibold"
                                         th:text="${ticket.trip.route.fromLocation.name + ' → ' + ticket.trip.route.toLocation.name}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="text-muted small">
                                        Giờ khởi hành
                                    </div>

                                    <div class="fw-semibold"
                                         th:text="${#temporals.format(ticket.trip.departureTime, 'dd/MM/yyyy HH:mm')}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="text-muted small">
                                        Xe
                                    </div>

                                    <div class="fw-semibold"
                                         th:text="${ticket.trip.bus.licensePlate + ' - ' + ticket.trip.bus.type}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="text-muted small">
                                        Tổng tiền
                                    </div>

                                    <div class="fw-bold fs-5 text-success"
                                         th:text="${#numbers.formatDecimal(ticket.totalPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}">
                                    </div>
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="d-flex flex-wrap justify-content-center gap-3 mt-5">

                        <a th:href="@{/passenger/my-tickets}"
                           class="btn btn-primary btn-lg">
                            🎫 Vé của tôi
                        </a>

                        <a th:href="@{/passenger/trips}"
                           class="btn btn-outline-primary btn-lg">
                            Đặt vé tiếp
                        </a>

                        <a th:href="@{/}"
                           class="btn btn-outline-secondary btn-lg">
                            Về trang chủ
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
