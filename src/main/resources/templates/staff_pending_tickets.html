<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Vé chờ thanh toán - Staff</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
  <div class="container">
    <span class="navbar-brand">🚌 Bus Ticket Pro - Nhân viên</span>
    <div>
      <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
      <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
      <form th:action="@{/logout}" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">🎫 Danh sách vé chờ thanh toán</h4>
    <a th:href="@{/staff/tickets}" class="btn btn-secondary btn-sm">← Quay lại</a>
  </div>

  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

  <div th:if="${#lists.isEmpty(tickets)}" class="alert alert-info">
    Không có vé nào đang chờ thanh toán.
  </div>

  <table th:if="${!#lists.isEmpty(tickets)}" class="table table-bordered table-hover">
    <thead class="table-success">
    <tr>
      <th>Mã vé</th>
      <th>Hành khách</th>
      <th>Xe</th>
      <th>Tuyến</th>
      <th>Ghế</th>
      <th>Giờ đi</th>
      <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="ticket : ${tickets}">
      <td><strong th:text="${ticket.ticketCode}"></strong></td>
      <td th:text="${ticket.passengerName + ' | ' + ticket.phone}"></td>
      <td th:text="${ticket.trip.bus.licensePlate}"></td>
      <td th:text="${ticket.trip.route.fromLocation.name + ' → ' + ticket.trip.route.toLocation.name}"></td>
      <td th:text="${ticket.seat.seatNumber}"></td>
      <td th:text="${#temporals.format(ticket.trip.departureTime,'dd/MM/yyyy HH:mm')}"></td>
      <td>
        <form th:action="@{/staff/tickets/confirm/{id}(id=${ticket.id})}" method="post" style="display:inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn btn-success btn-sm"> Thanh toán</button>
        </form>
        <form th:action="@{/staff/tickets/cancel/{id}(id=${ticket.id})}" method="post" style="display:inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn btn-danger btn-sm"
                  onclick="return confirm('Xác nhận hủy vé này?')"> Hủy</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
