<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tỉnh thành - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro - Admin</span>
        <div>
            <a th:href="@{/admin/buses}" class="btn btn-outline-light btn-sm me-2">Quản lý xe</a>
            <a th:href="@{/admin/buses/routes}" class="btn btn-outline-light btn-sm me-2">Tuyến đường</a>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Danh sách Tỉnh thành</h2>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Tên tỉnh thành</th>
            <th>Mã</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="loc, i : ${locations}">
            <td th:text="${i.count}"></td>
            <td th:text="${loc.name}"></td>
            <td th:text="${loc.code}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
