<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vé của tôi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-2">Hồ sơ</a>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">🎫 Vé của tôi</h4>
        <a th:href="@{/passenger/trips}" class="btn btn-secondary btn-sm">← Quay lại</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(tickets)}" class="alert alert-info">
        Bạn chưa có vé nào.
    </div>

    <table th:if="${!#lists.isEmpty(tickets)}" class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>Mã vé</th>
            <th>Tuyến đường</th>
            <th>Giờ khởi hành</th>
            <th>Ghế</th>
            <th>Giá vé</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ticket : ${tickets}">
            <td><strong th:text="${ticket.ticketCode}"></strong></td>
            <td th:text="${ticket.trip.route.fromLocation.name + ' → ' + ticket.trip.route.toLocation.name}"></td>
            <td th:text="${#temporals.format(ticket.trip.departureTime, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${ticket.seat.seatNumber}"></td>
            <td th:text="${#numbers.formatDecimal(ticket.totalPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
            <td>
                <span th:if="${ticket.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Chờ thanh toán</span>
                <span th:if="${ticket.status.name() == 'PAID'}" class="badge bg-success">Đã thanh toán</span>
                <span th:if="${ticket.status.name() == 'CANCELLED'}" class="badge bg-danger">Đã hủy</span>
            </td>
            <td>
                <form th:if="${ticket.status.name() == 'PENDING'}"
                      th:action="@{/passenger/cancel-ticket/{id}(id=${ticket.id})}"
                      method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-danger btn-sm"
                            onclick="return confirm('Xác nhận hủy vé này?')">Hủy vé</button>
                </form>
                <span th:if="${ticket.status.name() != 'PENDING'}" class="text-muted">-</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
