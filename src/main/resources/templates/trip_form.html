<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm chuyến xe - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro - Admin</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Thêm chuyến xe mới</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/admin/trips/create}" th:object="${tripDTO}" method="post" novalidate>

        <div class="mb-3">
            <label class="form-label">Chọn xe</label>
            <select class="form-select"
                    th:field="*{busId}"
                    th:classappend="${#fields.hasErrors('busId')} ? 'is-invalid' : ''">
                <option value="">-- Chọn xe --</option>
                <option th:each="bus : ${buses}"
                        th:value="${bus.id}"
                        th:text="${bus.licensePlate + ' - ' + bus.type + ' (' + bus.seatCount + ' ghế)'}">
                </option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('busId')}"
                 th:errors="*{busId}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Chọn tuyến đường</label>
            <select class="form-select"
                    th:field="*{routeId}"
                    th:classappend="${#fields.hasErrors('routeId')} ? 'is-invalid' : ''">
                <option value="">-- Chọn tuyến --</option>
                <option th:each="route : ${routes}"
                        th:value="${route.id}"
                        th:text="${route.fromLocation.name + ' → ' + route.toLocation.name + ' (' + route.distanceKm + ' km)'}">
                </option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('routeId')}"
                 th:errors="*{routeId}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ngày giờ khởi hành</label>
            <input type="datetime-local" class="form-control"
                   th:field="*{departureTime}"
                   th:classappend="${#fields.hasErrors('departureTime')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('departureTime')}"
                 th:errors="*{departureTime}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Giá vé (VNĐ)</label>
            <input type="number" class="form-control"
                   th:field="*{price}" placeholder="VD: 250000"
                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}"></div>
        </div>

        <button type="submit" class="btn btn-success">Lưu chuyến xe</button>
        <a th:href="@{/admin/trips}" class="btn btn-secondary">Quay lại</a>
    </form>
</div>
</body>
</html>
