<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - Bus Ticket Pro</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark btp-navbar-passenger">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            🚌 Bus Ticket Pro
        </a>

        <div class="ms-auto d-flex flex-wrap align-items-center gap-2">

            <span class="text-white d-none d-lg-inline">
                Xin chào, <strong th:text="${username}"></strong>
            </span>

            <a th:href="@{/}" class="btn btn-light btn-sm">
                Trang chủ
            </a>


            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <button type="submit"
                        class="btn btn-outline-light btn-sm">
                    Đăng xuất
                </button>
            </form>

        </div>
    </div>
</nav>

<main class="container page-shell">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">

                <div>
                    <h2 class="page-title">
                        Hồ sơ cá nhân
                    </h2>

                    <p class="page-subtitle">
                        Cập nhật thông tin cá nhân của bạn.
                    </p>
                </div>

                <a href="javascript:history.back()"
                   class="btn btn-outline-secondary">
                    ← Quay lại
                </a>

            </div>

            <div th:if="${message}"
                 class="alert alert-success"
                 th:text="${message}">
            </div>

            <div class="row g-4">

                <!-- Card thông tin -->
                <div class="col-md-4">

                    <div class="btp-card text-center h-100">

                        <div class="btp-card-body">

                            <div class="mb-3">
                                <div style="
                                    width:90px;
                                    height:90px;
                                    border-radius:50%;
                                    background:linear-gradient(135deg,#2563eb,#1e40af);
                                    display:flex;
                                    align-items:center;
                                    justify-content:center;
                                    margin:auto;
                                    color:white;
                                    font-size:32px;
                                    font-weight:700;
                                ">
                                    👤
                                </div>
                            </div>

                            <h5 class="fw-bold mb-1"
                                th:text="${username}">
                            </h5>

                            <p class="text-muted mb-4">
                                Passenger Account
                            </p>

                            <div class="text-start small">

                                <div class="mb-3">
                                    <div class="text-muted">
                                        Hệ thống
                                    </div>

                                    <div class="fw-semibold">
                                        Bus Ticket Pro
                                    </div>
                                </div>

                                <div>
                                    <div class="text-muted">
                                        Trạng thái
                                    </div>

                                    <span class="badge bg-success">
                                        Đang hoạt động
                                    </span>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- Form -->
                <div class="col-md-8">

                    <div class="btp-card">

                        <div class="btp-card-header">
                            ✏️ Cập nhật thông tin
                        </div>

                        <div class="btp-card-body">

                            <form th:action="@{/profile/update}"
                                  th:object="${profileDTO}"
                                  method="post"
                                  novalidate>

                                <div class="mb-4">

                                    <label class="form-label fw-semibold">
                                        Họ tên
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{fullName}"
                                           placeholder="Nhập họ và tên của bạn"
                                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('fullName')}"
                                         th:errors="*{fullName}">
                                    </div>

                                </div>

                                <div class="mb-4">

                                    <label class="form-label fw-semibold">
                                        Số điện thoại
                                    </label>

                                    <input type="text"
                                           class="form-control"
                                           th:field="*{phone}"
                                           placeholder="VD: 0912345678"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('phone')}"
                                         th:errors="*{phone}">
                                    </div>

                                </div>

                                <div class="mb-4">

                                    <label class="form-label fw-semibold">
                                        Email
                                    </label>

                                    <input type="email"
                                           class="form-control"
                                           th:field="*{email}"
                                           placeholder="example@gmail.com"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">

                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}">
                                    </div>

                                </div>

                                <div class="d-flex justify-content-end gap-2">

                                    <a href="javascript:history.back()"
                                       class="btn btn-outline-secondary">
                                        Hủy
                                    </a>

                                    <button type="submit"
                                            class="btn btn-primary">
                                        Cập nhật hồ sơ
                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
