<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">🚌 Bus Ticket Pro</span>
        <div>
            <span class="text-white me-3">Xin chào, <strong th:text="${username}"></strong></span> <!-- ✅ Thêm -->
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Hồ sơ cá nhân</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/profile/update}" th:object="${profileDTO}" method="post" novalidate>
        <div class="mb-3">
            <label class="form-label">Họ tên</label>
            <input type="text" class="form-control"
                   th:field="*{fullName}"
                   placeholder="Nhập họ và tên của bạn"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}"
                 th:errors="*{fullName}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Số điện thoại</label>
            <input type="text" class="form-control"
                   th:field="*{phone}"
                   placeholder="Nhập số điện thoại (VD: 0912345678)"
                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                 th:errors="*{phone}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control"
                   th:field="*{email}"
                   placeholder="Nhập địa chỉ email"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}"></div>
        </div>
        <button type="submit" class="btn btn-primary">Cập nhật</button>
        <a href="javascript:history.back()" class="btn btn-secondary">Quay lại</a>
    </form>
</div>
</body>
</html>
